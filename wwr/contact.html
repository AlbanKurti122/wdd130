    <!-- CSS -->

</head>
<body>
    <section class="contact-info">
    <header class="header-grid">
        <img src="images/z-wwr-blue.jpg" alt="Rafting logo">
        <nav class="nav-flex">
            <a href="index.html">Home</a>
            <a href="about.html">About us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact us</a>
        </nav>
    </header>
        <p>123 River Road, Rapidsville, CA 90210</p>
        <p>Phone: (555) 123-4567</p>
        <p>Email: info@whitewaterrafting.com</p>

            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.020356187043!2d-122.4194154846812!3d37.77492977975978!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085809cbae1b3ab%3A0xcee7d7a1d4f8!2sRafting%20Center!5e0!3m2!1sen!2sus!4v1700000000000"width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"referrerpolicy="no-referrer-when-downgrade">
            </iframe>
    </section>
    
    <section class="employees">
        <h2>Meet Our Team</h2>
        <figure>
            <img src="images/employee1.webp" alt="Happy Employee 1">
            <figcaption>Sarah - Tour Guide</figcaption>
        </figure>
        <figure>
            <img src="images/employee2.jpg" alt="Happy Employee 2">
            <figcaption>Mike - Customer Service</figcaption>
        </figure>
        <figure>
            <img src="images/employee3.jpg" alt="Happy Employee 3">
            <figcaption>Lisa - Safety Coordinator</figcaption>
        </figure>
    </section>

    <section class="contact-form">
        <h2>Send Us a Message</h2>
        <form action="#" method="post">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <p>Purpose of Message:</p>
            <label><input type="radio" name="purpose" value="general"> General Inquiry</label><br>
            <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label><br>
            <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>

            <label for="message">Your Message:</label><br>
            <textarea id="message" name="message" rows="5" required></textarea><br>

            <label><input type="checkbox" name="subscribe"> Please subscribe me to the monthly newsletter</label><br>

            <button type="submit">Send Message</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2025 Whitewater Rafting</p>
        <p><a href="images/mid_fidelity_wireframe.png" target="_blank">Look Wireframe</a></p>
    </footer>
</body>
</html>
