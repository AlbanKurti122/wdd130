<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Whitewater Rafting for reservations, general questions, or website feedback.">
    <meta name="author" content="Your Name or Company Name">
    <title>Contact Us - Whitewater Rafting</title>
    
    <!-- Google Fonts: Lato and Merriweather Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Merriweather+Sans&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles/rafting.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <section class="contact-info">
        <h2>Contact Information</h2>
        <p>123 River Road, Rapidsville, CA 90210</p>
        <p>Phone: (555) 123-4567</p>
        <p>Email: info@whitewaterrafting.com</p>

        <iframe
            src="https://www.google.com/maps/embed?...your embed link here..."
            width="600"
            height="450"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </section>
    
    <section class="employees">
        <h2>Meet Our Team</h2>
        <figure>
            <img src="images/employee1.webp" alt="Happy Employee 1">
            <figcaption>Sarah - Tour Guide</figcaption>
        </figure>
        <figure>
            <img src="images/employee2.jpg" alt="Happy Employee 2">
            <figcaption>Mike - Customer Service</figcaption>
        </figure>
        <figure>
            <img src="images/employee3.jpg" alt="Happy Employee 3">
            <figcaption>Lisa - Safety Coordinator</figcaption>
        </figure>
    </section>

    <section class="contact-form">
        <h2>Send Us a Message</h2>
        <form action="#" method="post">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <p>Purpose of Message:</p>
            <label><input type="radio" name="purpose" value="general"> General Inquiry</label><br>
            <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label><br>
            <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>

            <label for="message">Your Message:</label><br>
            <textarea id="message" name="message" rows="5" required></textarea><br>

            <label><input type="checkbox" name="subscribe"> Please subscribe me to the monthly newsletter</label><br>

            <button type="submit">Send Message</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2025 Whitewater Rafting</p>
    </footer>
</body>
</html>
